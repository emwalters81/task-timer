name: appReleaser

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Select version increment'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions: 
      contents: write 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        
      - name: Install npm
        run: npm ci

      - name: Bump version
          id: version
          run: |
            # npm version writes package.json and creates a git tag
            NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
      
      - name: Build
        run: npm build 

      - name: Package build output
        run: |
          tar -czf release-${{ steps.version.outputs.version }}.tar.gz build/

      - name: Commit & push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.version }}"
          git tag ${{ steps.version.outputs.version }}
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true  # auto-generate changelog 
          files: |
            release-${{ steps.version.outputs.version }}.tar.gz
